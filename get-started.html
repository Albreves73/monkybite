<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create your MonkyBite account</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- 🔷 Header -->
<header>
  <a href="index.html" class="logo">
    <img src="logo.png" alt="MonkyBite Logo" />
    <span class="brand-name">MonkyBite</span>
  </a>

  <div class="nav-wrapper">
    <nav class="nav-desktop">
      <a href="index.html">HOME</a>
      <a href="login.html">LOGIN</a>
      <a href="plans.html">SIGN UP</a>
      <a href="contact.html">CONTACT</a>
    </nav>

    <button class="hamburger" id="hamburger-btn">☰</button>
    <nav class="nav-mobile hidden" id="mobile-nav">
      <a href="index.html">HOME</a>
      <a href="login.html">LOGIN</a>
      <a href="plans.html">SIGN UP</a>
      <a href="contact.html">CONTACT</a>
    </nav>
  </div>
</header>

<!-- 🔷 Go Back Button -->
<div class="go-back-wrapper">
  <a href="plans.html" class="go-back">Go Back</a>
</div>

<!-- 🔷 Signup Form -->
<main class="signup-wrapper">
  <h1 class="signup-title">Create your MonkyBite account</h1>
  <p id="selected-plan">You're signing up for the Free plan.</p>

  <div class="social-signup">
    <a href="#" class="social-login">Sign up with Google</a>
    <a href="#" class="apple-login">Sign up with Apple</a>
  </div>

  <div class="divider">or</div>

  <form id="signup-form" class="signup-form" method="post" action="signup.php">

    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" required />
    <p id="email-error" style="color: red; font-size: 14px; display: none;"></p>

    <div class="name-row">
      <div>
        <label for="first-name">First Name</label>
        <input type="text" id="first-name" name="firstName" required />
      </div>
      <div>
        <label for="last-name">Last Name</label>
        <input type="text" id="last-name" name="lastName" required />
      </div>
    </div>

    <label for="password">Password</label>
    <input
      type="password"
      id="password"
      name="password"
      required
      minlength="10"
      placeholder="Create a strong password"
    />

    <input type="hidden" id="plan" name="plan">

    <p class="consent-notice">
      By clicking <strong>Agree and Sign Up</strong>, you agree to our
      <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
    </p>

    <button type="submit" class="signup-button">Agree and Sign Up</button>
  </form>
</main>

<!-- 🔷 Carrega o plano da URL -->
<script>
  const params = new URLSearchParams(window.location.search);
  const selectedPlan = params.get("plan");

  if (!selectedPlan) {
    window.location.href = "plans.html";
  }

  const planDisplay = document.getElementById("selected-plan");
  const formatted = selectedPlan.charAt(0).toUpperCase() + selectedPlan.slice(1);
  planDisplay.textContent = `You're signing up for the ${formatted} plan.`;

  document.getElementById("plan").value = selectedPlan;
</script>

<!-- 🔷 Menu mobile -->
<script>
  const hamburgerBtn = document.getElementById("hamburger-btn");
  const mobileNav = document.getElementById("mobile-nav");

  hamburgerBtn.addEventListener("click", () => {
    mobileNav.classList.toggle("hidden");
  });
</script>

<!-- 🔷 Verificação de e-mail (CORRETA) -->
<script>
document.getElementById("email").addEventListener("blur", function () {
    const email = this.value.trim();
    const msg = document.getElementById("email-error");

    if (email === "") {
        msg.textContent = "";
        msg.style.display = "none";
        return;
    }

    fetch("signup.php?check_email=" + encodeURIComponent(email))
        .then(response => response.text())
        .then(result => {
            if (result === "exists") {
                msg.textContent = "This email is already registered.";
                msg.style.display = "block";
                msg.style.color = "red";
            } else {
                msg.textContent = "";
                msg.style.display = "none";
            }
        });
});
</script>

</body>
</html>
