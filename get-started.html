<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Create your MonkyBite account</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="style.css" />
<style>
#emailError, #passwordError { color: red; font-size: 14px; margin-top:4px; display:none; }
.hidden { display:none; }
</style>
</head>
<body>
<header>
<a href="index.html" class="logo"><img src="logo.png" alt="MonkyBite Logo" /><span class="brand-name">MonkyBite</span></a>
<nav>
<a href="index.html">HOME</a>
<a href="login.html">LOGIN</a>
<a href="plans.html">SIGN UP</a>
<a href="contact.html">CONTACT</a>
</nav>
</header>

<main class="signup-wrapper">
<h1>Create your MonkyBite account</h1>
<p id="selected-plan">You're signing up for the Free plan.</p>

<form id="signup-form" method="post" action="signup.php">
<label for="email">Email Address</label>
<input type="email" id="email" name="email" required />
<p id="emailError"></p>

<div class="name-row">
<div>
<label for="first-name">First Name</label>
<input type="text" id="first-name" name="firstName" required />
</div>
<div>
<label for="last-name">Last Name</label>
<input type="text" id="last-name" name="lastName" required />
</div>
</div>

<label for="password">Create Password</label>
<input type="password" id="password" name="password" required minlength="10" />
<small style="display:block; margin-top:4px;">
Password must contain uppercase, lowercase, number and special character, and be at least 10 chars.
</small>
<p id="passwordError"></p>

<input type="hidden" id="plan" name="plan" value="free" />

<button type="submit">Agree and Sign Up</button>
</form>
</main>

<script>
// show plan from URL and set hidden field
const params = new URLSearchParams(window.location.search);
const selectedPlan = params.get("plan");
if (!selectedPlan) { window.location.href = "plans.html"; }
document.getElementById("selected-plan").textContent = You're signing up for the ${selectedPlan.charAt(0).toUpperCase()+selectedPlan.slice(1)} plan.;
document.getElementById("plan").value = selectedPlan;

document.addEventListener("DOMContentLoaded", function () {
const emailInput = document.getElementById("email");
const emailError = document.getElementById("emailError");
const form = document.getElementById("signup-form");
const passwordInput = document.getElementById("password");
const passwordError = document.getElementById("passwordError");

// check email on blur (user finished typing and left field)
emailInput.addEventListener("blur", function () {
const email = this.value.trim();
if (!email) { emailError.textContent = ""; emailError.style.display = "none"; return; }

fetch("check-email.php", {
method: "POST",
headers: { "Content-Type": "application/x-www-form-urlencoded" },
body: "email=" + encodeURIComponent(email)
})
.then(r => r.json())
.then(data => {
if (data.exists) {
emailError.textContent = "This email is already registered.";
emailError.style.display = "block";
} else {
emailError.textContent = "";
emailError.style.display = "none";
}
})
.catch(() => { emailError.textContent = ""; emailError.style.display = "none"; });
});

// client-side password rules + prevent submit if email exists
form.addEventListener("submit", function (e) {
const password = passwordInput.value;
const hasLength = password.length >= 10;
const hasUpper = /[A-Z]/.test(password);
const hasLower = /[a-z]/.test(password);
const hasNumber = /[0-9]/.test(password);
const hasSymbol = /[!@#$%^&*(),.?":{}|<>]/.test(password);

if (!hasLength || !hasUpper || !hasLower || !hasNumber || !hasSymbol) {
e.preventDefault();
passwordError.textContent = "Password must contain uppercase, lowercase, number and special character and be at least 10 chars.";
passwordError.style.display = "block";
} else {
passwordError.textContent = "";
passwordError.style.display = "none";
}

if (emailError.style.display === "block") {
e.preventDefault();
}
});
});
</script>
</body>
</html>
