<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MonkyBite — Checkout</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- 🔷 Header (same as all pages) -->
<header>
  <a href="index.html" class="logo">
    <img src="logo.png" alt="MonkyBite Logo" />
    <span class="brand-name">MonkyBite</span>
  </a>

  <div class="nav-wrapper">
    <!-- Desktop menu -->
    <nav class="nav-desktop">
      <a href="index.html">HOME</a>
      <a href="login.html">LOGIN</a>
      <a href="plans.html">SIGN UP</a>
      <a href="contact.html">CONTACT</a>
    </nav>

    <!-- Mobile menu -->
    <button class="hamburger" id="hamburger-btn">☰</button>
    <nav class="nav-mobile hidden" id="mobile-nav">
      <a href="index.html">HOME</a>
      <a href="login.html">LOGIN</a>
      <a href="plans.html">SIGN UP</a>
      <a href="contact.html">CONTACT</a>
    </nav>
  </div>
</header>

<!-- 🔷 Go Back Button -->
<div class="go-back-wrapper">
  <a href="javascript:history.back()" class="go-back">Go Back</a>
</div>

<!-- 🔷 Checkout Section -->
<main class="checkout-wrapper">
  <h1 class="checkout-title">Complete Your Subscription</h1>

  <p id="plan-info">Loading plan...</p>
  <p id="email-info">Loading email...</p>

  <div class="checkout-box">
    <h2>Payment</h2>
    <p>Your subscription will start immediately after payment.</p>

    <!-- 🔷 Square Payment Form -->
    <div id="card-container"></div>

    <button id="card-button" class="plan-button" style="margin-top: 20px;">
      Pay Now
    </button>

    <p id="payment-status" style="margin-top: 15px; color: red;"></p>
  </div>
</main>

<!-- 🔷 Footer -->
<footer>
  <p>© 2025 MonkyBite.</p>
</footer>

<!-- 🔷 Mobile Menu Script -->
<script>
  const hamburgerBtn = document.getElementById("hamburger-btn");
  const mobileNav = document.getElementById("mobile-nav");

  hamburgerBtn.addEventListener("click", () => {
    mobileNav.classList.toggle("hidden");
  });
</script>

<!-- 🔷 Load plan + email from URL -->
<script>
  const params = new URLSearchParams(window.location.search);
  const plan = params.get("plan");
  const email = params.get("email");

  if (!plan || !email) {
    document.getElementById("plan-info").textContent = "Invalid checkout link.";
    document.getElementById("email-info").textContent = "";
  } else {
    const formattedPlan = plan.charAt(0).toUpperCase() + plan.slice(1);
    document.getElementById("plan-info").textContent = `Selected Plan: ${formattedPlan}`;
    document.getElementById("email-info").textContent = `Account Email: ${email}`;
  }
</script>

<!-- 🔷 Square Web Payments SDK -->
<script src="https://web.squarecdn.com/v1/square.js"></script>

<!-- 🔷 Square Payment Logic -->
<script>
  document.addEventListener("DOMContentLoaded", async function () {
    const params = new URLSearchParams(window.location.search);
    const plan = params.get("plan");
    const email = params.get("email");

    // Square credentials (replace with your real keys)
    const appId = "sq0idp-JHruqkfGcQdQfmgDQYjnUQ";
    const locationId = "LTZ1WY5B11Q9Q";

    if (!window.Square) {
      document.getElementById("payment-status").textContent =
        "Payment system failed to load.";
      return;
    }

    let payments;
    try {
      payments = window.Square.payments(appId, locationId);
    } catch (e) {
      document.getElementById("payment-status").textContent =
        "Square initialization error.";
      return;
    }

    // Create card form
    const card = await payments.card();
    await card.attach("#card-container");

    // Handle payment
    const cardButton = document.getElementById("card-button");
    cardButton.addEventListener("click", async function () {
      cardButton.disabled = true;

      const status = document.getElementById("payment-status");
      status.textContent = "Processing payment...";

      try {
        const result = await card.tokenize();
        if (result.status === "OK") {
          // Send token to backend
          const response = await fetch("process-payment.php", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body:
              "token=" +
              encodeURIComponent(result.token) +
              "&email=" +
              encodeURIComponent(email) +
              "&plan=" +
              encodeURIComponent(plan),
          });

          const data = await response.json();

          if (data.success) {
            status.style.color = "green";
            status.textContent = "Payment successful! Redirecting...";
            window.location.href = data.redirect;
          } else {
            status.textContent = "Payment failed: " + data.message;
            cardButton.disabled = false;
          }
        } else {
          status.textContent = "Card validation failed.";
          cardButton.disabled = false;
        }
      } catch (e) {
        status.textContent = "Payment error.";
        cardButton.disabled = false;
      }
    });
  });
</script>

</body>
</html>
