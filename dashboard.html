<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MonkyBite — Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <img src="logo.png" alt="MonkyBite Logo" />
    <span class="brand-name">MonkyBite</span>
  </a>

  <div class="nav-wrapper">
    <nav class="nav-desktop">
      <a href="index.html">HOME</a>
      <a href="login.html">LOGIN</a>
      <a href="plans.html">SIGN UP</a>
      <a href="contact.html">CONTACT</a>
    </nav>

    <button class="hamburger" id="hamburger-btn" type="button">☰</button>
    <nav class="nav-mobile hidden" id="mobile-nav">
      <a href="index.html">HOME</a>
      <a href="login.html">LOGIN</a>
      <a href="plans.html">SIGN UP</a>
      <a href="contact.html">CONTACT</a>
    </nav>
  </div>
</header>

<main class="get-started-box">
  <h1 id="welcome">Welcome to MonkyBite Cloud</h1>
  <p id="plan-info">Loading plan...</p>
  <p id="usage-info">Your subscription is active.</p>

  <a id="open-cloud" href="https://cloud.monkybite.com" class="button primary" target="_blank" rel="noopener">
    Go to Cloud Login
  </a>
</main>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const hamburgerBtn = document.getElementById("hamburger-btn");
    const mobileNav = document.getElementById("mobile-nav");

    hamburgerBtn.addEventListener("click", () => {
      mobileNav.classList.toggle("hidden");
    });

    const userName = sessionStorage.getItem("user_name") || "User";
    const plan = sessionStorage.getItem("plan") || "starter";

    document.getElementById("welcome").innerText = `Welcome to MonkyBite Cloud, ${userName}`;
    document.getElementById("plan-info").innerText = `You're subscribed to the ${plan.charAt(0).toUpperCase() + plan.slice(1)} plan.`;
  });
</script>

</body>
</html>
